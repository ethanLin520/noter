<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Noter app icon">
  <style>
    @keyframes noter-blink {
      0%, 45%   { opacity: 1; }
      50%, 95%  { opacity: 0; }
      100%      { opacity: 1; }
    }
    .cursor { animation: noter-blink 1.1s steps(1, end) infinite; }
  </style>

  <!-- App background: warm off-white, softly rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#faf9f7"/>

  <!-- Note page -->
  <rect x="132" y="96" width="248" height="320" rx="26" ry="26"
        fill="#ffffff" stroke="#1f2328" stroke-width="11"/>

  <!-- Text lines (dark ink) -->
  <g stroke="#1f2328" stroke-width="18" stroke-linecap="round" fill="none">
    <line x1="172" y1="188" x2="340" y2="188"/>
    <line x1="172" y1="250" x2="340" y2="250"/>
    <!-- Active line being written (shorter) -->
    <line x1="172" y1="312" x2="288" y2="312"/>
  </g>

  <!-- Blinking text cursor (forest-green accent) resting on the active line -->
  <line class="cursor" x1="308" y1="290" x2="308" y2="334"
        stroke="#2f6f4f" stroke-width="18" stroke-linecap="round"/>
</svg>
